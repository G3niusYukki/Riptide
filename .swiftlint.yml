# SwiftLint configuration for Riptide

disabled_rules:
  - trailing_comma
  - opening_brace
  - trailing_whitespace

opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - modifier_order
  - toggle_bool

line_length:
  warning: 150
  error: 200
  ignores_comments: true

file_length:
  warning: 1000
  error: 1500

type_body_length:
  warning: 700
  error: 1000

function_body_length:
  warning: 80
  error: 120

excluded:
  - vendor/
  - .build/
  - DerivedData/
  - Tests/
