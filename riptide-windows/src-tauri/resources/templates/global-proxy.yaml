# Global Proxy Template
# All traffic goes through the selected proxy

port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
ipv6: false

proxies:
  # Add your proxy nodes here
  # Example:
  # - name: "US Server"
  #   type: ss
  #   server: 1.2.3.4
  #   port: 8388
  #   cipher: aes-256-gcm
  #   password: "your-password"

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - DIRECT
      # Add your proxy names here

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - MATCH,Proxy
