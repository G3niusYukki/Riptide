name: Test Suite

on:
  push:
    paths:
      - '**/*.swift'
      - 'Package.swift'
      - '.github/workflows/test.yml'
      - '.swiftlint.yml'
  pull_request:
    paths:
      - '**/*.swift'
      - 'Package.swift'
      - '.github/workflows/test.yml'
      - '.swiftlint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Swift files
        id: changed-swift-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.swift
            Package.swift

      - name: SwiftLint
        if: steps.changed-swift-files.outputs.any_changed == 'true'
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict ${{ steps.changed-swift-files.outputs.all_changed_files }}

      - name: No Swift files changed
        if: steps.changed-swift-files.outputs.any_changed != 'true'
        run: echo 'No Swift files changed; skipping SwiftLint.'
